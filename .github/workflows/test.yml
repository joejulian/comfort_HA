name: Test

on:
  pull_request:
  push:
    branches:
      - main
      - refactor/core-style-incremental

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest

      - name: Compile integration modules
        run: python -m py_compile custom_components/kumo_cloud/*.py
